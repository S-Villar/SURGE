name: CI

on:
  push:
    branches: [ '**' ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit tests (pytest -q)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project (editable) + test extras
        run: |
          python -m pip install --upgrade pip
          # Install the package itself so `import surge` exercises pyproject.toml
          pip install -e ".[dev]" || pip install -e .
          # Core runtime deps (belt-and-suspenders in case pyproject extras skip anything)
          pip install pytest pytest-cov scikit-learn pandas numpy matplotlib joblib scipy pyyaml
          # Optional heavy deps (non-blocking: we want tests to skip, not fail).
          # onnxscript is required by torch>=2.11's torch.onnx.export path.
          pip install torch onnx onnxruntime onnxscript || echo "torch/onnx optional; continuing"
          pip install optuna scikit-optimize || echo "Optuna/skopt optional; continuing"

      - name: Run unit tests
        run: |
          pytest -q tests/ --tb=short

  e2e-regression:
    name: End-to-end regression (train -> predict -> ONNX)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install project + torch/onnx (required for this job)
        run: |
          python -m pip install --upgrade pip
          # [dev] -> pytest; [torch] -> torch; [onnx] -> onnx + onnxscript + onnxruntime.
          # All three extras are required for the end-to-end regression job.
          pip install -e ".[dev,torch,onnx]"

      - name: Run E2E smoke (sklearn + torch + ONNX) on sample CSV
        run: |
          # This single pytest target IS the end-to-end demo for CI purposes:
          # it loads data/datasets/M3DC1/m3dc1_synthetic_profiles_sample.csv,
          # trains an sklearn model, trains a tiny PyTorch MLP, exports to ONNX,
          # re-loads with onnxruntime, and verifies outputs match within tolerance.
          pytest -q tests/test_e2e_release_smoke.py -v

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run ruff
        run: |
          ruff check surge/ tests/ || echo "ruff issues found (non-blocking pre-0.1.0)"
