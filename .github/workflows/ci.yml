name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
        
    - name: Install optional dependencies for full testing
      run: |
        pip install optuna
        pip install scikit-optimize
        pip install botorch
        pip install gpflow
        pip install psutil
        pip install matplotlib
        pip install seaborn
        
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=surge --cov-report=xml --cov-report=term-missing
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
        
    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort mypy
        pip install -e .
        
    - name: Run ruff linter
      run: ruff check surge/ tests/
      
    - name: Check code formatting with black
      run: black --check surge/ tests/
      
    - name: Check import sorting with isort
      run: isort --check-only surge/ tests/
      
    - name: Run type checking with mypy
      run: mypy surge/ --ignore-missing-imports

  docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
        
    - name: Install documentation dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install sphinx sphinx-rtd-theme
        cd docs && pip install -r requirements.txt
        
    - name: Build documentation
      run: |
        cd docs
        make html
        
    - name: Check for documentation warnings
      run: |
        cd docs
        make html 2>&1 | tee build.log
        if grep -q "WARNING" build.log; then
          echo "Documentation build contains warnings"
          exit 1
        fi
