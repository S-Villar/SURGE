name: CI

on:
  push:
    branches: [ main, 'refactor/**', 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Use explicit YAML strings for python versions so actions/setup-python
        # receives valid version identifiers (avoid float parsing and extra quotes)
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install core dependencies from requirements.txt if available
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          fi
          # Install essential dependencies for testing
          pip install pytest pytest-cov scikit-learn pandas numpy matplotlib joblib scipy
          # Install optional dependencies (non-blocking)
          pip install torch || echo "PyTorch installation failed, continuing..."
          pip install optuna scikit-optimize || echo "Optional dependencies failed, continuing..."

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8 ruff
      - name: Run flake8
        run: |
          flake8 . --max-line-length=100 --extend-ignore=E203,W503 || echo "flake8 issues found (non-blocking)"
      - name: Run ruff (if pyproject.toml exists)
        run: |
          if [ -f pyproject.toml ]; then
            ruff check . --config pyproject.toml || echo "ruff issues found (non-blocking)"
          fi
