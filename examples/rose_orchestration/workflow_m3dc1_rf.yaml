# Random forest on SPARC M3DC1 subset (requires PKL + metadata).
dataset_path: workspace/sparc_m3dc1_active_learning.parquet
dataset_format: auto
metadata_path: ../../data/datasets/M3DC1/sparc_m3dc1_D1_metadata.yaml
test_fraction: 0.2
val_fraction: 0.2
standardize_inputs: true
standardize_outputs: false
predictions_scope: ["val"]
predictions_format: csv
output_dir: .
run_tag: rose_m3dc1_rf
seed: 42
overwrite_existing_run: true
models:
  - key: sklearn.random_forest
    name: rf_m3dc1
    params:
      n_estimators: 120
      max_depth: 8
      min_samples_leaf: 2
      random_state: 42
