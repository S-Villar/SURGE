# Random forest surrogate — fast, no PyTorch.
dataset_path: workspace/synthetic_active_learning.parquet
dataset_format: auto
metadata_path: synthetic_demo_metadata.yaml
test_fraction: 0.2
val_fraction: 0.15
standardize_inputs: true
standardize_outputs: false
predictions_scope: ["val"]
predictions_format: csv
output_dir: .
run_tag: rose_demo_rf
seed: 42
overwrite_existing_run: true
models:
  - key: sklearn.random_forest
    name: rf_demo
    params:
      n_estimators: 120
      max_depth: 8
      min_samples_leaf: 2
      random_state: 42
