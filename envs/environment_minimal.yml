name: surge-minimal
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python>=3.8,<3.12
  
  # Core dependencies only
  - numpy>=1.20.0
  - scipy>=1.5.0
  - pandas>=1.5.0
  - scikit-learn>=1.0.0
  - joblib>=1.0.0
  - matplotlib>=3.5.0
  
  # Basic optimization
  - pip
  - pip:
      - -e .
      - optuna>=3.0.0
      - scikit-optimize>=0.9.0

# Minimal environment for basic SURGE functionality
# No PyTorch, no advanced optimization, no GPflow
# Suitable for testing or lightweight deployments
#
# To create: conda env create -f environment_minimal.yml
# To activate: conda activate surge-minimal
