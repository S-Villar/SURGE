name: surge
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.11
  
  # Core scientific computing
  - numpy>=1.20.0
  - scipy>=1.5.0
  - pandas>=1.5.0
  
  # Machine Learning - Core
  - scikit-learn>=1.0.0
  - joblib>=1.0.0
  
  # PyTorch (CPU or GPU - conda will auto-detect)
  - pytorch>=1.9.0
  - torchvision
  - torchaudio
  - cpuonly  # Remove this line if you have GPU and want CUDA support
  
  # Hyperparameter Optimization
  - optuna>=3.0.0
  - scikit-optimize>=0.9.0
  
  # Visualization
  - matplotlib>=3.5.0
  - seaborn>=0.11.0
  
  # Development and Testing
  - pytest>=6.0
  - pytest-cov
  - jupyter
  - jupyterlab
  - ipython
  
  # Code Quality
  - ruff>=0.1.0
  - black
  - isort
  - mypy
  
  # System utilities
  - psutil
  
  # Documentation (optional but useful)
  - sphinx>=7.0.0
  - sphinx-rtd-theme>=2.0.0
  - numpydoc>=1.5.0
  
  # Pip dependencies that might not be available in conda
  - pip
  - pip:
      # SURGE package itself (editable install)
      - -e .
      
      # Advanced optimization with BoTorch
      - botorch>=0.8.0
      - gpytorch>=1.9.0
      
      # Optuna integrations
      - optuna-integration[botorch]>=3.5.0
      
      # GPflow for Gaussian Process models
      - tensorflow>=2.8.0,<2.16
      - tensorflow-probability>=0.19.0
      - gpflow>=2.5.0
      
      # Optional: Advanced visualization
      # - plotly>=5.0.0
      # - holoviews>=1.15.0
      # - bokeh>=2.4.0
      
      # Package management
      - setuptools>=45
      - setuptools_scm
      - wheel

# Additional notes:
# 1. For GPU support with CUDA:
#    - Remove 'cpuonly' from dependencies
#    - Replace pytorch channel installation with:
#      - pytorch>=1.9.0
#      - pytorch-cuda=11.8  # or your CUDA version
#
# 2. For Apple Silicon Macs (M1/M2/M3):
#    - Remove 'cpuonly'
#    - PyTorch will automatically use MPS (Metal Performance Shaders)
#
# 3. To create this environment:
#    conda env create -f environment.yml
#
# 4. To activate:
#    conda activate surge
#
# 5. To update:
#    conda env update -f environment.yml --prune
