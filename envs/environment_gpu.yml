name: surge-gpu
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python>=3.8,<3.12
  
  # Core scientific computing
  - numpy>=1.20.0
  - scipy>=1.5.0
  - pandas>=1.5.0
  
  # Machine Learning - Core
  - scikit-learn>=1.0.0
  - joblib>=1.0.0
  
  # PyTorch with CUDA support
  - pytorch>=2.0.0
  - pytorch-cuda=11.8  # Change to 12.1 for newer GPUs
  - torchvision
  - torchaudio
  - cudatoolkit=11.8  # Match with pytorch-cuda version
  
  # Hyperparameter Optimization
  - optuna>=3.0.0
  - scikit-optimize>=0.9.0
  
  # Visualization
  - matplotlib>=3.5.0
  - seaborn>=0.11.0
  
  # Development and Testing
  - pytest>=6.0
  - pytest-cov
  - jupyter
  - jupyterlab
  - ipython
  
  # Code Quality
  - ruff>=0.1.0
  - black
  - isort
  - mypy
  
  # System utilities
  - psutil
  
  # Documentation
  - sphinx>=7.0.0
  - sphinx-rtd-theme>=2.0.0
  - numpydoc>=1.5.0
  
  # Pip dependencies
  - pip
  - pip:
      # SURGE package itself
      - -e .
      
      # Advanced optimization with BoTorch (GPU-accelerated)
      - botorch>=0.8.0
      - gpytorch>=1.9.0
      - linear-operator>=0.3.0
      
      # Optuna integrations
      - optuna-integration[botorch]>=3.5.0
      
      # TensorFlow for GPflow (GPU support)
      - tensorflow>=2.8.0,<2.16
      - tensorflow-probability>=0.19.0
      - gpflow>=2.5.0
      
      # Advanced visualization
      - plotly>=5.0.0
      
      # Package management
      - setuptools>=45
      - setuptools_scm
      - wheel

# GPU-enabled environment for SURGE
# Includes PyTorch with CUDA, BoTorch, and GPflow with TensorFlow GPU support
#
# Prerequisites:
# - NVIDIA GPU with compatible drivers
# - CUDA 11.8 or 12.1 installed (or will be installed by conda)
#
# To create: conda env create -f environment_gpu.yml
# To activate: conda activate surge-gpu
#
# To verify GPU is available:
#   python -c "import torch; print(f'CUDA available: {torch.cuda.is_available()}')"
#   python -c "import torch; print(f'GPU: {torch.cuda.get_device_name(0)}')"
