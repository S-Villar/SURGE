# SURGE docs/agents — skill catalog manifest
# For agents or CI: discover skills without parsing Markdown.
# Schema version follows repo conventions; bump when fields change.

schema_version: "1.0"
project: SURGE
catalog_root: docs/agents
reference_frameworks:
  - name: Academy Agents
    org_url: https://github.com/academy-agents
  - name: Agentic Blueprint Catalog
    repo_url: https://github.com/academy-agents/agentic_blueprint_catalog

skills:
  - id: surge.slurm.bootstrap
    path: skills/surge-slurm-bootstrap.md
    title: Slurm SURGE_ROOT and submit directory
    domain: [hpc, slurm, surge]
    triggers:
      - user submits or debugs Slurm batch training for SURGE
      - job fails with missing scripts or dataset paths on compute nodes
    implements_blueprint: local-hpc-batch-bootstrap  # see blueprint/README.md

  - id: surge.hpc.conda_parquet
    path: skills/surge-hpc-conda-parquet.md
    title: Conda activation and Parquet (pyarrow) on compute nodes
    domain: [hpc, conda, python, parquet, surge]
    triggers:
      - ImportError on read_parquet / no usable engine / pyarrow
      - stack traces show ~/.local site-packages on batch nodes
    implements_blueprint: local-hpc-python-environment-parity

  - id: surge.results.locator
    path: skills/surge-results-locator.md
    title: Locate growth-rate vs delta-p metrics and figures
    domain: [surge, m3dc1, documentation]
    triggers:
      - user asks for R2, RMSE, plots, or latest results without specifying target
    implements_blueprint: null

  - id: surge.m3dc1.eval_2d_delta_p
    path: skills/surge-m3dc1-eval-2d-delta-p.md
    title: M3DC1 delta-p 2D test map evaluation
    domain: [surge, m3dc1, evaluation, visualization]
    triggers:
      - user runs eval_test_delta_p_2d_maps.py
      - checkpoint and run_dir must match torch_mlp_profiles_deltap training
    implements_blueprint: null
