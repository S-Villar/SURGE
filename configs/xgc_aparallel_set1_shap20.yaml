# XGC ModelS – train on top 20 SHAP features
# Data: /global/cfs/projectdirs/m499/olcf_ai_hackathon_2025/
# Run: surge run configs/xgc_aparallel_set1_shap20.yaml --run-tag xgc_modelS_shap20
# SHAP ranking from runs/xgc_aparallel_set1_v3/plots/shap_xgc_rf_aparallel/shap_summary_tree_dot.png

dataset_path: /global/cfs/projectdirs/m499/olcf_ai_hackathon_2025
dataset_format: xgc
metadata_overrides:
  set_name: set1
input_columns:
  - input_0
  - input_61
  - input_117
  - input_89
  - input_14
  - input_145
  - input_19
  - input_20
  - input_173
  - input_17
  - input_42
  - input_25
  - input_21
  - input_27
  - input_45
  - input_9
  - input_16
  - input_26
  - input_8
  - input_44
notes: >
  ModelS: XGC A_parallel surrogate on top 20 SHAP features.
  Eval on set1; fine-tune with set2.
test_fraction: 0.2
val_fraction: 0.1
standardize_inputs: true
standardize_outputs: true
predictions_scope: ["train", "val", "test"]
predictions_format: csv
output_dir: .
run_tag: xgc_modelS_shap20
overwrite_existing_run: true
seed: 42
sample_rows: 50000
models:
  - key: torch.mlp
    name: xgc_mlp_aparallel
    request_uncertainty: false
    params:
      hidden_layers: [128, 64]
      dropout: 0.1
      max_epochs: 2000
      patience: 10
      verbose_freq: 10
      batch_size: 256
      learning_rate: 0.001
      activation: relu
    hpo:
      enabled: true
      n_trials: 30
      metric: val_rmse
      direction: minimize
      search_space:
        hidden_layers:
          type: categorical
          choices:
            - [64, 32]
            - [128, 64]
            - [256, 128]
        dropout:
          type: float
          low: 0.0
          high: 0.2
        learning_rate:
          type: loguniform
          low: 1e-4
          high: 5e-3
  - key: sklearn.random_forest
    name: xgc_rf_aparallel
    request_uncertainty: false
    params:
      n_estimators: 200
      max_depth: 20
      min_samples_leaf: 2
    hpo:
      enabled: true
      n_trials: 5
      metric: val_rmse
      direction: minimize
      search_space:
        n_estimators:
          type: int
          low: 100
          high: 400
          step: 50
        max_depth:
          type: int
          low: 10
          high: 30
        min_samples_leaf:
          type: int
          low: 1
          high: 5
