# XGC A_parallel surrogate – Fine-tune set1 model on set2 (beta 0.5%)
# Data: /global/cfs/projectdirs/m499/olcf_ai_hackathon_2025/
#
# Prerequisite: Train on set1 first, e.g. surge run configs/xgc_aparallel_set1.yaml
# Then: surge run configs/xgc_aparallel_set2_finetune.yaml
#
# Set pretrained_run_dir to your set1 run (e.g. runs/xgc_aparallel_set1_<timestamp>)

dataset_path: /global/cfs/projectdirs/m499/olcf_ai_hackathon_2025
dataset_format: xgc
metadata_overrides:
  set_name: set2_beta0p5
pretrained_run_dir: runs/xgc_aparallel_set1_v3  # Update to your set1 run path
finetune_lr_scale: 0.1
notes: >
  Fine-tune set1-trained model on set2 (beta 0.5%).
  Uses pretrained scalers and model weights; continues training with scaled LR.
test_fraction: 0.2
val_fraction: 0.1
standardize_inputs: true
standardize_outputs: true
predictions_scope: ["train", "val", "test"]
predictions_format: csv
output_dir: .
run_tag: xgc_aparallel_set2_finetune
overwrite_existing_run: true
seed: 42
sample_rows: 50000
models:
  - key: torch.mlp
    name: xgc_mlp_aparallel
    request_uncertainty: false
    params:
      hidden_layers: [256, 128, 64]
      dropout: 0.1
      max_epochs: 500
      patience: 20
      verbose_freq: 10
      batch_size: 256
      learning_rate: 0.001
      activation: relu
    hpo:
      enabled: false  # No HPO when fine-tuning
  - key: sklearn.random_forest
    name: xgc_rf_aparallel
    request_uncertainty: true
    params:
      n_estimators: 200
      max_depth: 20
      min_samples_leaf: 2
    hpo:
      enabled: false  # RF retrains from scratch; no fine-tuning
