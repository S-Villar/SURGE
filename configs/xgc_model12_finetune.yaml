# XGC Model12 – fine-tune Model1 (61 cols) on set2
# Run after: surge run configs/xgc_aparallel_set1_61cols.yaml --run-tag xgc_model1_61cols
# Then: surge run configs/xgc_model12_finetune.yaml

dataset_path: /global/cfs/projectdirs/m499/olcf_ai_hackathon_2025
dataset_format: xgc
metadata_overrides:
  set_name: set2_beta0p5
pretrained_run_dir: runs/xgc_model1_61cols
finetune_lr_scale: 0.1
n_inputs: 61
notes: >
  Model12: Fine-tune Model1 (61 cols) on set2. Eval on set2 and set1 datastreamsets.
test_fraction: 0.2
val_fraction: 0.1
standardize_inputs: true
standardize_outputs: true
predictions_scope: ["train", "val", "test"]
predictions_format: csv
output_dir: .
run_tag: xgc_model12_finetune
overwrite_existing_run: true
seed: 42
sample_rows: 50000
models:
  - key: torch.mlp
    name: xgc_mlp_aparallel
    request_uncertainty: false
    params:
      hidden_layers: [256, 128, 64]
      dropout: 0.1
      max_epochs: 2000
      patience: 10
      verbose_freq: 10
      batch_size: 256
      learning_rate: 0.001
      activation: relu
  - key: sklearn.random_forest
    name: xgc_rf_aparallel
    request_uncertainty: false
    params:
      n_estimators: 200
      max_depth: 20
      min_samples_leaf: 2
