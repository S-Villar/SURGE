# XGC A_parallel surrogate – OLCF hackathon set2 (beta 0.5%)
# Data: /global/cfs/projectdirs/m499/olcf_ai_hackathon_2025/
#
# Run: surge run configs/xgc_aparallel_set2_beta0p5.yaml

dataset_path: /global/cfs/projectdirs/m499/olcf_ai_hackathon_2025
dataset_format: xgc
metadata_overrides:
  set_name: set2_beta0p5
notes: >
  XGC A_parallel surrogate on OLCF hackathon set2 (beta 0.5%).
  201 inputs, 2 outputs (output_1 = A_parallel).
  ~20M samples; subsample for quick runs.
test_fraction: 0.2
val_fraction: 0.1
standardize_inputs: true
standardize_outputs: true
predictions_scope: ["train", "val", "test"]
predictions_format: csv
output_dir: .
run_tag: xgc_aparallel_set2_beta0p5
overwrite_existing_run: true
seed: 42
sample_rows: 50000  # Subsample; set to null for full ~20M samples
models:
  - key: torch.mlp
    name: xgc_mlp_aparallel
    request_uncertainty: false
    params:
      hidden_layers: [256, 128, 64]
      dropout: 0.1
      max_epochs: 2000
      patience: 10
      verbose_freq: 10
      batch_size: 256
      learning_rate: 0.001
      activation: relu
    hpo:
      enabled: true
      n_trials: 50
      metric: val_rmse
      direction: minimize
      search_space:
        hidden_layers:
          type: categorical
          choices:
            - [256, 128]
            - [256, 128, 64]
            - [512, 256, 128]
        dropout:
          type: float
          low: 0.0
          high: 0.2
        learning_rate:
          type: loguniform
          low: 1e-4
          high: 5e-3
        batch_size:
          type: categorical
          choices: [128, 256, 512]
  - key: sklearn.random_forest
    name: xgc_rf_aparallel
    request_uncertainty: false
    params:
      n_estimators: 200
      max_depth: 20
      min_samples_leaf: 2
    hpo:
      enabled: true
      n_trials: 5
      metric: val_rmse
      direction: minimize
      search_space:
        n_estimators:
          type: int
          low: 100
          high: 400
          step: 50
        max_depth:
          type: int
          low: 10
          high: 30
        min_samples_leaf:
          type: int
          low: 1
          high: 5
