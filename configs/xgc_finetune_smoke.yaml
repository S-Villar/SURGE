# XGC finetune smoke run - minimal for quick testing
dataset_path: /global/cfs/projectdirs/m499/olcf_ai_hackathon_2025
dataset_format: xgc
metadata_overrides:
  set_name: set2_beta0p5
pretrained_run_dir: runs/xgc_aparallel_set1_v3
finetune_lr_scale: 0.1
test_fraction: 0.2
val_fraction: 0.1
standardize_inputs: true
standardize_outputs: true
predictions_scope: ["train", "val", "test"]
predictions_format: csv
output_dir: .
run_tag: xgc_aparallel_set2_finetune_smoke
overwrite_existing_run: true
seed: 42
sample_rows: 5000
models:
  - key: torch.mlp
    name: xgc_mlp_aparallel
    request_uncertainty: false
    params:
      hidden_layers: [256, 128]
      dropout: 0.1
      max_epochs: 30
      patience: 5
      verbose_freq: 10
      batch_size: 128
      learning_rate: 0.001
      activation: relu
    hpo:
      enabled: false
  - key: sklearn.random_forest
    name: xgc_rf_aparallel
    request_uncertainty: false
    params:
      n_estimators: 50
      max_depth: 10
      min_samples_leaf: 2
    hpo:
      enabled: false
